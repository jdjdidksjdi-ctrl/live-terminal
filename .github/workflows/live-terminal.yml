name: Direct Live Terminal

on:
  workflow_dispatch:
    inputs:
      tunnel_url:
        description: 'The Tunnel URL from your Web Terminal UI (e.g. https://xxx.loca.lt)'
        required: true

jobs:
  terminal-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install node-pty socket.io-client

      - name: Start Reverse Agent
        env:
          TUNNEL_URL: ${{ github.event.inputs.tunnel_url }}
        run: |
          cat << 'EOF' > agent.js
          const { io } = require('socket.io-client');
          const pty = require('node-pty');
          const os = require('os');
          
          const url = process.env.TUNNEL_URL;
          if (!url) {
            console.error('No TUNNEL_URL provided');
            process.exit(1);
          }
          
          console.log('Connecting to Tunnel:', url);
          
          // Connect to the /agent namespace of our local server
          const socket = io(url + '/agent', {
            transports: ['websocket'],
            reconnection: true,
            extraHeaders: {
              'Bypass-Tunnel-Reminder': 'true',
              'User-Agent': 'Mozilla/5.0'
            }
          });
          
          let ptyProcess = null;
          
          socket.on('connect', () => {
            console.log('Connected to Local Server!');
            
            if (ptyProcess) {
              ptyProcess.kill();
            }
            
            ptyProcess = pty.spawn('bash', [], {
              name: 'xterm-color',
              cols: 80,
              rows: 24,
              cwd: process.env.GITHUB_WORKSPACE || process.env.HOME,
              env: process.env
            });
            
            ptyProcess.on('data', function(data) {
              socket.emit('terminal-output', data);
            });
            
            ptyProcess.on('exit', () => {
              console.log('Shell exited.');
              socket.disconnect();
              process.exit(0);
            });
          });
          
          socket.on('terminal-input', (data) => {
            if (ptyProcess) {
              ptyProcess.write(data);
            }
          });
          
          socket.on('resize', (size) => {
            if (ptyProcess && size.cols && size.rows) {
              ptyProcess.resize(size.cols, size.rows);
            }
          });
          
          socket.on('disconnect', () => {
            console.log('Disconnected from Local Server.');
          });
          
          socket.on('connect_error', (err) => {
            console.error('Connection Error:', err.message);
          });
          
          // Keep alive
          setInterval(() => {}, 10000);
          EOF
          
          node agent.js
