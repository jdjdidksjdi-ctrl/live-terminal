name: Live Terminal (tmate)

on:
  workflow_dispatch:
  schedule:
    # Run every 5 minutes (will be queued if one is already running)
    - cron: '*/5 * * * *'

concurrency:
  group: always-on-terminal
  cancel-in-progress: false

jobs:
  terminal-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Start tmate Live Terminal
        uses: mxschmitt/action-tmate@v3
        with:
          install-dependencies: true
